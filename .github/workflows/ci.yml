name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shellcheck -x --source-path=SCRIPTDIR install.sh uninstall.sh test/run.sh test/scripts.sh
          shellcheck -x --source-path=SCRIPTDIR extension/scripts/bash/*.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Install / idempotency / uninstall test
        run: ./test/run.sh
      - name: Runtime helper script tests
        run: ./test/scripts.sh
