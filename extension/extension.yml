schema_version: "1.0"

extension:
  id: multi-repo
  name: "Multi-Repo Workspace"
  version: "2.0.0"
  description: "Cross-repo coordination for spec-driven workflows. Reads .specify/repos.yaml and lets /speckit-plan, /speckit-tasks, /speckit-implement, and /speckit-taskstoissues operate against sibling product repos."
  author: 1devstudio
  repository: https://github.com/1devstudio/github-spec-kit-multi-repo
  license: MIT

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: git
      required: true
    - name: yq
      required: true

provides:
  commands:
    - name: speckit.multi-repo.config
      file: commands/speckit.multi-repo.config.md
      description: "Validate and summarize .specify/repos.yaml"
    - name: speckit.multi-repo.branch
      file: commands/speckit.multi-repo.branch.md
      description: "Create / check out a feature branch in one sibling repo"
    - name: speckit.multi-repo.status
      file: commands/speckit.multi-repo.status.md
      description: "Report clean/dirty + current branch across every repo in repos.yaml"

  config:
    - name: "repos.yaml"
      template: "config-template.yaml"
      target: ".specify/repos.yaml"
      description: "Workspace repo registry"
      required: true

tags:
  - "multi-repo"
  - "workspace"
  - "branching"
  - "stacked-prs"
